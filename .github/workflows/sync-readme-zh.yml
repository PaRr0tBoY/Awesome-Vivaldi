name: Sync Chinese README

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed READMEs
        id: detect
        run: |
          CHANGED=""
          if git diff --name-only HEAD~1 HEAD | grep -qx "README.md"; then
            CHANGED="${CHANGED}main"
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qx "Vivaldi8.0Stable/README.md"; then
            CHANGED="${CHANGED} 80"
          fi
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Translate main README (incremental)
        if: contains(steps.detect.outputs.changed, 'main')
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          export DIFF=$(git diff HEAD~1 HEAD -- README.md)
          export ZH_CURRENT=$(cat Doc/READMEZH/READMEMAIN.md)

          python3 << 'PYEOF' > /tmp/translation_response.txt
import json, os, re, subprocess, sys

# ============================================================
# Path protection utilities
# ============================================================
PATH_PATTERN = re.compile(r'(?:\.\.?/[^\s<>"\'()\[\]]+|https?://[^\s<>"\'()\[\]]+)')

def protect_paths(text):
    """Replace all relative paths and URLs with __P0__, __P1__, ... placeholders.
    Returns (protected_text, [original_paths_list])."""
    paths = []
    def _repl(m):
        paths.append(m.group(0))
        return f'__P{len(paths)-1}__'
    protected = PATH_PATTERN.sub(_repl, text)
    return protected, paths

def restore_paths(text, paths):
    """Replace __P0__, __P1__, ... placeholders back with original paths."""
    result = text
    for i, original in enumerate(paths):
        result = result.replace(f'__P{i}__', original)
    return result

# ============================================================
# Load inputs
# ============================================================
diff_text = os.environ.get('DIFF', '')
zh_current = os.environ.get('ZH_CURRENT', '')

# Protect paths in both the diff and existing translation
diff_protected, diff_paths = protect_paths(diff_text)
zh_protected, zh_paths = protect_paths(zh_current)

# Combined paths list for restoration later
all_paths = diff_paths + zh_paths

# ============================================================
# Build prompt
# ============================================================
prompt = f"""You are a README translator for a Vivaldi browser mod project.

TASK: Apply the English diff to the existing Chinese translation. Only translate and update the changed parts based on the diff. Keep everything else completely identical.

CRITICAL RULES:
1. NEVER modify any file path, URL, or relative path — these are IDENTIFIERS, not text to translate
2. NEVER modify image sources (src="..."), links ([...](...)), or HTML attributes
3. NEVER modify code blocks, backtick-quoted text, bash commands, or file names
4. NEVER translate "Vivaldi8.0Stable", "Vivaldi", variable names, or mod file names like "VividPeek.js"
5. Keep all markdown structure, HTML tags, badges, anchor links (#xxx), and relative paths EXACTLY as-is
6. The header navigation must stay: [English](../../README.md) | **简体中文**
7. Output the COMPLETE updated Chinese README (not just the diff)
8. No commentary, no code fences, just raw markdown
9. If a markdown table has alignment markers (| :--- | :--- |), preserve them exactly

ENGLISH DIFF (what changed):
```
{diff_protected}
```

EXISTING CHINESE README:
```
{zh_protected}
```

IMPORTANT: Compare the diff against the existing Chinese file. Only modify sections that correspond to the changed lines in the diff. Copy everything else verbatim."""

# ============================================================
# Call OpenRouter API
# ============================================================
api_key = os.environ.get('OPENROUTER_KEY', '')
if not api_key:
    print("::error::OPENROUTER_KEY is not set", file=sys.stderr)
    sys.exit(1)

payload = json.dumps({
    "model": "openrouter/free",
    "messages": [{"role": "user", "content": prompt}]
})

try:
    resp = subprocess.run(
        ["curl", "-s", "-w", "\n%{http_code}",
         "https://openrouter.ai/api/v1/chat/completions",
         "-H", f"Authorization: Bearer {api_key}",
         "-H", "Content-Type: application/json",
         "-d", payload],
        capture_output=True, text=True, timeout=120
    )
except subprocess.TimeoutExpired:
    print("::error::API request timed out after 120s", file=sys.stderr)
    sys.exit(1)

stdout = resp.stdout
# Separate body and status code (last line)
lines = stdout.strip().split('\n')
http_code = lines[-1].strip()
body = '\n'.join(lines[:-1])

if http_code != "200":
    print(f"::error::API returned HTTP {http_code}: {body}", file=sys.stderr)
    sys.exit(1)

# Parse response
try:
    data = json.loads(body)
    translated = data.get('choices', [{}])[0].get('message', {}).get('content', '')
except (json.JSONDecodeError, KeyError, IndexError) as e:
    print(f"::error::Failed to parse API response: {e}", file=sys.stderr)
    print(body, file=sys.stderr)
    sys.exit(1)

if not translated or translated == 'null':
    print("::error::Translation returned empty content", file=sys.stderr)
    print(body, file=sys.stderr)
    sys.exit(1)

# ============================================================
# Restore paths
# ============================================================
translated = restore_paths(translated, all_paths)

# Verify: if any __P remains, something went wrong
remaining = re.findall(r'__P\d+__', translated)
if remaining:
    print(f"::warning::Found {len(remaining)} unreplaced path placeholders in translated output", file=sys.stderr)

# Write output file
with open('/tmp/translated_output.md', 'w', encoding='utf-8') as f:
    f.write(translated)

print("Translation completed successfully", file=sys.stderr)
PYEOF

          TRANSLATED=$(cat /tmp/translated_output.md)
          if [ -z "$TRANSLATED" ]; then
            exit 1
          fi
          echo "$TRANSLATED" > Doc/READMEZH/READMEMAIN.md
          echo "Updated Doc/READMEZH/READMEMAIN.md"

      - name: Translate Vivaldi 8.0 README (incremental)
        if: contains(steps.detect.outputs.changed, '80')
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          export DIFF=$(git diff HEAD~1 HEAD -- Vivaldi8.0Stable/README.md)
          ZH_FILE="Doc/READMEZH/README80.md"

          # If this is the first run and README80.md doesn't exist yet, create from scratch
          if [ ! -f "$ZH_FILE" ]; then
            echo "::notice::README80.md does not exist yet. Creating from scratch via full translation."
            export ZH_CURRENT=""
          else
            export ZH_CURRENT=$(cat "$ZH_FILE")
          fi

          python3 << 'PYEOF' > /tmp/translation_response_80.txt
import json, os, re, subprocess, sys

PATH_PATTERN = re.compile(r'(?:\.\.?/[^\s<>"\'()\[\]]+|https?://[^\s<>"\'()\[\]]+)')

def protect_paths(text):
    paths = []
    def _repl(m):
        paths.append(m.group(0))
        return f'__P{len(paths)-1}__'
    return PATH_PATTERN.sub(_repl, text), paths

def restore_paths(text, paths):
    result = text
    for i, original in enumerate(paths):
        result = result.replace(f'__P{i}__', original)
    return result

diff_text = os.environ.get('DIFF', '')
zh_current = os.environ.get('ZH_CURRENT', '')

diff_protected, diff_paths = protect_paths(diff_text)
zh_protected, zh_paths = protect_paths(zh_current)
all_paths = diff_paths + zh_paths

prompt = f"""You are a README translator for a Vivaldi browser mod project.

TASK: Apply the English diff to the existing Chinese translation. Only translate and update the changed parts. Keep everything else identical.

CRITICAL RULES:
1. NEVER modify any file path, URL, or relative path — these are IDENTIFIERS, not text to translate
2. NEVER modify image sources (src="..."), links ([...](...)), or HTML attributes
3. NEVER modify code blocks, backtick-quoted text, bash commands, or file names
4. NEVER translate "Vivaldi8.0Stable", "Vivaldi", variable names, or mod file names
5. Keep all markdown structure, HTML tags, badges, anchor links (#xxx), and relative paths EXACTLY as-is
6. The header navigation must stay: [English](../../Vivaldi8.0Stable/README.md) | **简体中文**
7. Output the COMPLETE updated Chinese README (not just the diff)
8. No commentary, no code fences, just raw markdown

ENGLISH DIFF (what changed):
```
{diff_protected}
"""

if zh_protected:
    prompt += f"""
EXISTING CHINESE README:
```
{zh_protected}
```"""
else:
    prompt += """
EXISTING CHINESE README: (empty — translate the full diff as a new file)"""

prompt += """

IMPORTANT: Only modify sections that correspond to the changed lines in the diff. Copy everything else verbatim."""

api_key = os.environ.get('OPENROUTER_KEY', '')
if not api_key:
    print("::error::OPENROUTER_KEY is not set", file=sys.stderr)
    sys.exit(1)

payload = json.dumps({
    "model": "openrouter/free",
    "messages": [{"role": "user", "content": prompt}]
})

resp = subprocess.run(
    ["curl", "-s", "-w", "\n%{http_code}",
     "https://openrouter.ai/api/v1/chat/completions",
     "-H", f"Authorization: Bearer {api_key}",
     "-H", "Content-Type: application/json",
     "-d", payload],
    capture_output=True, text=True, timeout=120
)

lines = resp.stdout.strip().split('\n')
http_code = lines[-1].strip()
body = '\n'.join(lines[:-1])

if http_code != "200":
    print(f"::error::API returned HTTP {http_code}: {body}", file=sys.stderr)
    sys.exit(1)

data = json.loads(body)
translated = data.get('choices', [{}])[0].get('message', {}).get('content', '')

if not translated or translated == 'null':
    print("::error::Translation returned empty content", file=sys.stderr)
    print(body, file=sys.stderr)
    sys.exit(1)

translated = restore_paths(translated, all_paths)

remaining = re.findall(r'__P\d+__', translated)
if remaining:
    print(f"::warning::Found {len(remaining)} unreplaced path placeholders in translated output", file=sys.stderr)

with open('/tmp/translated_output_80.md', 'w', encoding='utf-8') as f:
    f.write(translated)

print("Translation completed successfully", file=sys.stderr)
PYEOF

          TRANSLATED=$(cat /tmp/translated_output_80.md)
          if [ -z "$TRANSLATED" ]; then
            exit 1
          fi
          echo "$TRANSLATED" > "$ZH_FILE"
          echo "Updated $ZH_FILE"

      - name: Commit changes
        if: contains(steps.detect.outputs.changed, 'main') || contains(steps.detect.outputs.changed, '80')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Doc/READMEZH/READMEMAIN.md Doc/READMEZH/README80.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-sync Chinese README translations"
            git push
          fi
