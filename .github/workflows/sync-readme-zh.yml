name: Sync Chinese README

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect stale Chinese READMEs
        id: detect
        run: |
          STALE=""

          for target in "main:README.md:Doc/READMEZH/READMEMAIN.md" \
                        "80:Vivaldi8.0Stable/README.md:Doc/READMEZH/README80.md"; do
            LABEL="${target%%:*}"
            REST="${target#*:}"
            EN_FILE="${REST%%:*}"
            ZH_FILE="${REST#*:}"

            # Get current English README commit hash
            EN_SHA=$(git log -1 --format=%H -- "$EN_FILE" 2>/dev/null || echo "0000000")

            # Extract the source-commit marker from Chinese README
            if [ -f "$ZH_FILE" ]; then
              ZH_SOURCE=$(grep -oP '<!-- source-commit: \K[a-f0-9]+' "$ZH_FILE" 2>/dev/null || echo "none")
            else
              ZH_SOURCE="missing"
            fi

            if [ "$EN_SHA" != "$ZH_SOURCE" ]; then
              STALE="${STALE}${LABEL} "
              echo "::notice::$LABEL stale (EN=$EN_SHA, ZH=$ZH_SOURCE)"
            else
              echo "$LABEL: up to date"
            fi

            # Store the source commit hash for the translation step
            # Output name: main_source_sha or v80_source_sha
            [ "$LABEL" = "80" ] && OUTKEY="v80_source_sha" || OUTKEY="${LABEL}_source_sha"
            echo "${OUTKEY}=${EN_SHA}" >> "$GITHUB_OUTPUT"
          done

          echo "stale=${STALE}" >> "$GITHUB_OUTPUT"

      - name: Translate main README
        if: contains(steps.detect.outputs.stale, 'main')
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          SOURCE_COMMIT: ${{ steps.detect.outputs.main_source_sha }}
        run: |
          python3 .github/scripts/translate-readme.py \
            README.md \
            /tmp/translated_main.md \
            main

          if [ ! -s /tmp/translated_main.md ]; then
            echo "::error::Translation produced empty output"
            exit 1
          fi

          mv /tmp/translated_main.md Doc/READMEZH/READMEMAIN.md
          echo "Updated Doc/READMEZH/READMEMAIN.md"

      - name: Translate Vivaldi 8.0 README
        if: contains(steps.detect.outputs.stale, '80')
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          SOURCE_COMMIT: ${{ steps.detect.outputs.v80_source_sha }}
        run: |
          python3 .github/scripts/translate-readme.py \
            Vivaldi8.0Stable/README.md \
            /tmp/translated_80.md \
            80

          if [ ! -s /tmp/translated_80.md ]; then
            echo "::error::Translation produced empty output"
            exit 1
          fi

          mv /tmp/translated_80.md Doc/READMEZH/README80.md
          echo "Updated Doc/READMEZH/README80.md"

      - name: Commit changes
        if: contains(steps.detect.outputs.stale, 'main') || contains(steps.detect.outputs.stale, '80')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Doc/READMEZH/READMEMAIN.md Doc/READMEZH/README80.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs: auto-sync Chinese README translations"
          git push
